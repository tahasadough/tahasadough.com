<!doctype html>
<html
	lang="en"
	class="scrollbar-thin scrollbar-thumb-gray scrollbar-track-elevated overflow-x-hidden"
>
	<head>
		<script>
			(function () {
				var theme = localStorage.getItem('theme');
				if (!theme) {
					theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
				}
				if (theme === 'light') {
					document.documentElement.classList.add('light');
				}
			})();
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#000000" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Taha Sadough" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="overflow-x-hidden bg-surface font-sans text-on-surface antialiased"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
